<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <!-- Add Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
          crossorigin="anonymous">

    <!-- Add date picker CSS and JS references -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.4.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

    <style>
        /* Custom style for event cards */
        .event-card {
            margin: 10px;
            transition: transform 0.2s;
        }

        .event-card:hover {
            transform: scale(1.05);
        }

        .event-card img {
            max-height: 200px;
            object-fit: cover;
        }

        .event-date {
            font-size: 14px;
            color: #555;
            margin-top: 5px;
        }
    </style>

    <!--<script>
        $(function() {
            $("#eventStartDate").datepicker({ dateFormat: 'yy-mm-dd' });
            $("#eventEndDate").datepicker({ dateFormat: 'yy-mm-dd' });
        });
    </script>-->
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">Admin Dashboard</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item active">
                <a class="nav-link" href="#">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/createEvent}">Add Event</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/deleteEvent}">Delete Event</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/updateEvent}">Update Event</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-3">

    <h2>Welcome to Admin Dashboard</h2>

    <!-- Display existing events -->
    <h3>Existing Events:</h3>
    <div class="row">
        <div th:each="event : ${events}" class="col-md-4">
            <div class="card event-card">
                <img th:src="${event.eventPicture}" class="card-img-top" alt="Event Image">
                <div class="card-body">
                    <p class="card-text">Event name: <span th:text="${event.eventName}"></span></p>
                    <p class="card-text">Event info: <span th:text="${event.eventInfo}"></span></p>
                    <p class="card-text">Event tickets: <span th:text="${event.eventTicketNumber}"></span></p>
                    <p class="card-text">Event category: <span th:text="${event.eventCategory}"></span></p>
                    <p class="card-text">Event date: <span th:text="${event.eventDate}"></span></p>
                </div>
            </div>
        </div>
    </div>

    <!--<a th:href="@{/admin/createEvent}" class="btn btn-success">Add Event</a>
    <a th:href="@{/admin/deleteEvent}" class="btn btn-success">Delete Event</a>
    <a th:href="@{/admin/updateEvent}" class="btn btn-success">Update Event</a>-->

</div>

<!-- Add Bootstrap JS and Popper.js -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>

</body>
</html>
