<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Event</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <style>
        body {
            background-image: url("https://www.centertool.hu/wp-content/uploads/2016/09/white-background-images-for-website-white-wallpapers-hd-2014-onlybackground-image.jpg");
            background-repeat: no-repeat;
            background-size: cover;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
        }
        .btn-primary {
            background-color: #4CAF50;
            border: none;
        }
        .btn-primary:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Update Event</h2>
    <h3>Update Event Details:</h3>
    <form th:action="@{/admin/updateEvent/{eventId}(eventId=${event.eventId})}" method="post" th:object="${event}">
        <input type="hidden" th:field="*{eventId}">
        <div class="form-group">
            <label for="eventName">Event Name:</label>
            <input type="text" id="eventName" class="form-control" th:field="*{eventName}" required>
        </div>
        <div class="form-group">
            <label for="eventDate">Event Date:</label>
            <input type="date" id="eventDate" class="form-control" th:field="*{eventDate}" required>
        </div>
        <div class="form-group">
            <label for="eventTicketNumber">Event Ticket Number:</label>
            <input type="number" id="eventTicketNumber" class="form-control" th:field="*{eventTicketNumber}" required>
        </div>
        <div class="form-group">
            <label for="eventInfo">Event Info:</label>
            <textarea id="eventInfo" class="form-control" th:field="*{eventInfo}" required></textarea>
        </div>
        <div class="form-group">
            <label for="eventPicture">Event Picture URL:</label>
            <input type="text" id="eventPicture" class="form-control" th:field="*{eventPicture}" required>
        </div>
        <div class="form-group">
            <label for="eventCategory">Event Category:</label>
            <select id="eventCategory" class="form-control" th:field="*{eventCategory}" required>
                <option value="KONCERT">Concert</option>
                <option value="SPORT">Sport</option>
                <option value="FESTIVAL">Festival</option>
                <option value="POZORIŠTE">Theater</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Update Event</button>
    </form>
</div>
</body>
</html>
