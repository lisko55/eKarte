<body layout:fragment="body">
<section th:each="event, iterStat : ${events}" th:id="'section-' + ${event.eventId}" class="user-section">
    <div class="container px-5">
        <div class="row gx-5 align-items-center">
            <div class="col-lg-6 order-lg-2">
                <div class="p-5">
                    &lt;!&ndash;/* Display Event Image */&ndash;&gt;
                    <img class="img-fluid rounded-circle" th:src="${event.eventPicture}" alt="Event Image" />
                </div>
            </div>
            <div class="col-lg-6 order-lg-1">
                <div class="p-5">
                    &lt;!&ndash; Display Event Name &ndash;&gt;
                    <h2 class="display-4" th:text="${event.eventName}">Default Text if Event Name is Null</h2>

                    &lt;!&ndash; Display Event Date (Assuming eventDate is a property of EventDto) &ndash;&gt;
                    <p th:text="${#dates.format(event.eventDate, 'yyyy-MM-dd HH:mm:ss')}">Default Text if Event Date is Null</p>

                    &lt;!&ndash; Button to Toggle Event Info &ndash;&gt;
                    <button type="button" class="btn btn-primary" th:id="'btnShowEventInfo-' + ${event.eventId}" th:onclick="'toggleEventInfo(\'' + ${event.eventId} + '\');'">Show Event Info</button>

                    &lt;!&ndash; Display Event Info Initially Hidden &ndash;&gt;
                    <p th:id="'eventInfo-' + ${event.eventId}" style="display: none;" th:text="${event.eventInfo}">Default Text if Event Info is Null</p>
                </div>
            </div>
        </div>
    </div>
</section>

<script th:inline="javascript">
    function toggleEventInfo(eventId) {
        var eventInfoElement = document.getElementById('eventInfo-' + eventId);
        if (eventInfoElement.style.display === 'none') {
            eventInfoElement.style.display = 'block';
        } else {
            eventInfoElement.style.display = 'none';
        }
    }
</script>
