<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Event Fragment</title>
</head>
<body>
<div class="row gx-4 gx-lg-5" th:fragment="eventCard">
    <div class="col-md-4 mb-5" th:each="event, stat : ${events}">
        <div class="card h-100">
            <img class="card-img-top" th:src="@{${event.eventPicture}}" alt="Event Image">
            <div class="card-body">
                <h5 class="card-title" th:text="${event.eventName}">Event Name</h5>
                <h6 style="font-style: italic" th:text="${event.eventCategory}"></h6>
                <h6 style="font-style: italic" th:text="${event.eventDate}"></h6>
                <button type="button" class="btn btn-primary" th:id="'btnShowEventInfo-' + ${event.eventId}" th:onclick="'toggleEventInfo(' + ${event.eventId} + ')'">Show Event Info</button>
                <p th:id="'eventInfo-' + ${event.eventId}" style="display: none;" th:text="${event.eventInfo}">Event Info</p>
            </div>
        </div>
        <div class="w-100 d-none d-md-block d-lg-none" th:if="${stat.index % 3 == 2}"></div> <!-- Force new row after every 3 cards on md and up -->
    </div>
</div>
</body>
</html>
