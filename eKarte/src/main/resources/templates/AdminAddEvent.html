<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Add Events</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.4.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-image: url("https://www.centertool.hu/wp-content/uploads/2016/09/white-background-images-for-website-white-wallpapers-hd-2014-onlybackground-image.jpg");
            background-repeat: no-repeat;
            background-size: cover;
        }
        h2, h3 {
            color: #333;
            text-align: center;
            margin-top: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
        }
        .btn-primary {
            background-color: #4CAF50;
            border: none;
        }
        .btn-primary:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">Admin Dashboard</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item active">
                <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/createEvent}">Add Event</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/deleteEvent}">Delete Event</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/updateEvent}">Update Event</a>
            </li>
        </ul>
    </div>
</nav>
<div class="container">
    <h2>Add Events</h2>
    <h3>Add New Event:</h3>
    <form th:action="@{/admin/events}" method="post" th:object="${event}">
        <div class="form-group">
            <label for="eventName">Event Name:</label>
            <input type="text" id="eventName" class="form-control" th:field="*{eventName}" required>
        </div>
        <div class="form-group">
            <label for="eventDate">Event Date:</label>
            <input type="date" id="eventDate" class="form-control" th:field="*{eventDate}" required>
        </div>
        <div class="form-group">
            <label for="eventTicketNumber">Event Ticket Number:</label>
            <input type="number" id="eventTicketNumber" class="form-control" th:field="*{eventTicketNumber}" required>
        </div>
        <div class="form-group">
            <label for="eventInfo">Event Info:</label>
            <textarea id="eventInfo" class="form-control" th:field="*{eventInfo}" required></textarea>
        </div>
        <div class="form-group">
            <label for="eventPicture">Event Picture URL:</label>
            <input type="text" id="eventPicture" class="form-control" th:field="*{eventPicture}" required>
        </div>
        <div class="form-group">
            <label for="eventCategory">Event Category:</label>
            <select id="eventCategory" class="form-control" th:field="*{eventCategory}" required>
                <option value="KONCERT">Concert</option>
                <option value="SPORT">Sport</option>
                <option value="FESTIVAL">Festival</option>
                <option value="POZORIŠTE">Theater</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Add Event</button>
    </form>
</div>
</body>
</html>
