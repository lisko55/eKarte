<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Add Events</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.4.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.slim.min.js" integrity="sha384-u8md/LZBquR+BkvyqM9S4PDfu5WEoB/6EJq71RHq4G2tU8KGbR3uyyE/hJQ9bZqN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-VE4S8tn1bhIb6cWn6zD0MGH6UPAnATPV2gGhj9pDC7iIzJYFK2QJFpCqgRBsA6YH" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0px;
            background-image: url("https://www.centertool.hu/wp-content/uploads/2016/09/white-background-images-for-website-white-wallpapers-hd-2014-onlybackground-image.jpg");
            background-repeat: no-repeat;
            background-size: cover;
        }
        h2, h3 {
            color: #333;
        }

        form {
            max-width: 500px;
            margin: 0 auto;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

    </style>

</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">Admin Dashboard</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item active">
                <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/createEvent}">Add Event</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/deleteEvent}">Delete Event</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/updateEvent}">Update Event</a>
            </li>
        </ul>
    </div>
</nav>
<h2>Add Events</h2>

<h3>Add New Event:</h3>
<form th:action="@{/admin/events}" method="post" th:object="${event}">
    <div>
        <label for="eventName">Event Name:</label>
        <input type="text" id="eventName" th:field="*{eventName}" required>
    </div>

    <div>
        <label for="eventDate">Event  Date:</label>
        <input type="date" id="eventDate" th:field="*{eventDate}" required>
    </div>


    <div>
        <label for="eventTicketNumber">Event Ticket Number</label>
        <input type="number" id="eventTicketNumber" th:field="*{eventTicketNumber}" required>
    </div>

    <div>
        <label for="eventInfo">Event Info:</label>
        <textarea id="eventInfo" th:field="*{eventInfo}" required></textarea>
    </div>

    <div>
        <label for="eventPicture">Event Picture URL:</label>
        <input type="text" id="eventPicture" th:field="*{eventPicture}" required>
    </div>


    <div>
        <label for="eventCategory">Event Category:</label>
        <select id="eventCategory" th:field="*{eventCategory}" required>
            <option value="KONCERT">Concert</option>
            <option value="SPORT">Sport</option>
            <option value="FESTIVAL">Festival</option>
            <option value="POZORIŠTE">Theater</option>
        </select>
    </div>

    <button type="submit">Add Event</button>
</form>


</body>
</html>
