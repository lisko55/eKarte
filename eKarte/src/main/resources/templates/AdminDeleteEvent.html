<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Delete Event</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <style>
        body{
            background-image: url("https://www.centertool.hu/wp-content/uploads/2016/09/white-background-images-for-website-white-wallpapers-hd-2014-onlybackground-image.jpg");
            background-repeat: no-repeat;
            background-size: cover;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .card {
            margin-bottom: 20px;
            border: none;
            border-radius: 10px;
            overflow: hidden;
        }
        .card img {
            max-height: 200px;
            object-fit: cover;
        }
        .card-body {
            background: #f8f9fa;
        }
        .btn-danger {
            border-radius: 20px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">Admin Dashboard</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item active">
                <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/createEvent}">Add Event</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/deleteEvent}">Delete Event</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/admin/updateEvent}">Update Event</a>
            </li>
        </ul>
    </div>
</nav>
<div class="container">
    <h2>Delete Events</h2>
    <div class="row">
        <div class="col-md-4" th:each="event : ${events}">
            <div class="card">
                <img th:src="${event.eventPicture}" class="card-img-top" alt="Event Image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${event.eventName}"></h5>
                    <p class="card-text" th:text="${event.eventInfo}"></p>
                    <form th:action="@{/admin/deleteEvent/{eventId}(eventId=${event.eventId})}" method="post">
                        <input type="hidden" name="eventId" th:value="${event.eventId}">
                        <button type="submit" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this event?')">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
