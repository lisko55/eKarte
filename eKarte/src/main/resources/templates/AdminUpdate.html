<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Events</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">


  <style>
    body{
      background-image: url("https://www.centertool.hu/wp-content/uploads/2016/09/white-background-images-for-website-white-wallpapers-hd-2014-onlybackground-image.jpg");
      background-repeat: no-repeat;
      background-size: cover;
    }
  </style>


</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" href="#">Admin Dashboard</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item active">
        <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:href="@{/admin/createEvent}">Add Event</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:href="@{/admin/deleteEvent}">Delete Event</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:href="@{/admin/updateEvent}">Update Event</a>
      </li>
    </ul>
  </div>
</nav>
<div class="container">
  <h1>Update Events</h1>

  <div class="row">
    <!-- Display events in cards with update button -->
    <div class="col-md-4" th:each="event : ${events}">
      <div class="card" style="width: 18rem; margin-bottom: 20px;">
        <img th:src="${event.eventPicture}" class="card-img-top" alt="Event Image">
        <div class="card-body">
          <h5 class="card-title" th:text="${event.eventName}"></h5>
          <p class="card-text" th:text="${event.eventInfo}"></p>
          <p class="card-text" th:text="${event.eventTicketNumber}"></p>
          <p class="card-text" th:text="${event.eventDate}"></p>
          <p class="card-text" th:text="${event.eventCategory}"></p>

          <!-- Link to the update form for this event -->
          <a th:href="@{'/admin/updateEvent/' + ${event.eventId}}" class="btn btn-primary">Update</a>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
